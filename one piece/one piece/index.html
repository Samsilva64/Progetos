<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="img/logo2.png">
    <script src="script.js" defer></script>
    <title>Oane piece</title>
</head>
<body>
    
    <div class="corpo">
        <fieldset>
                
            <form class="formulario">
                <h1><img src="img/login.png" alt="logo" class="login"> Login</h1>
                
                
                <div class="input1">
                    <input type="text" id="p1" name="nome" placeholder="Username" required><br>
                    <img src="img/nome.png" alt="user">
                </div><br>
                
                <div class="input2">
                    <input type="password" id="p2" name="nome" placeholder="Password" required>
                    <img src="img/acesso.png" alt="pass">  
                </div><br>    
    
                <div>
                    <input type="checkbox" id="c1" name="mim" >
                    <label for="c1">Remember me</label>  
                    </div>
                        
                <div class="check">  
                    <a href="#">Forget password?</a>
                </div>
                
                <button><img src="img/chapeu.png" alt="" onclick="enviaDados()" id="botao" >Login </button>
                
                <p>Don't have an account? <a href="#">Resister</a></p>
            </form>
        </fieldset>
    </div>
    
</body>
</html>
